name: Build snip Desktop DMG

# Two paths:
#   • branch / PR pushes → unsigned per-arch smoke build (artifacts only), so
#     we know the desktop tree still compiles + packages.
#   • a `desktop-v<version>` tag → the signed `release` job: builds both arches
#     in one shot, publishes the DMG + zip + latest-mac.yml auto-update feed to
#     a GitHub Release, and marks it latest for downloads + the updater.

on:
  push:
    branches: [main]
    tags:
      - "desktop-v*"
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-dmg.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-dmg.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    # Smoke-build only on branches/PRs. Tag pushes go straight to the signed
    # `release` job below (a single both-arch invocation needed for a coherent
    # latest-mac.yml), so skip the per-arch matrix on tags.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('desktop/package.json') }}

      - name: Install desktop deps
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Install icon-generation tools
        run: brew install librsvg

      - name: Generate DMG assets (icon.icns + background)
        working-directory: desktop
        run: bun run generate:dmg-assets

      - name: Build renderer
        working-directory: desktop
        run: bun run build:renderer

      - name: Configure code signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            # Use the multiline-safe heredoc form so a base64 cert with
            # embedded newlines (the default `base64` line-wraps at col 76)
            # makes it through the env file intact.
            delim="EOF_$(openssl rand -hex 8)"
            {
              printf '%s<<%s\n%s\n%s\n' CSC_LINK "$delim" "$MACOS_CERTIFICATE" "$delim"
              printf '%s<<%s\n%s\n%s\n' CSC_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_ID "$delim" "$APPLE_ID_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_APP_SPECIFIC_PASSWORD "$delim" "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_TEAM_ID "$delim" "$APPLE_TEAM_ID_SECRET" "$delim"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "No MACOS_CERTIFICATE secret set — building unsigned DMG."
          fi

      - name: Build DMG (${{ matrix.arch }})
        working-directory: desktop
        run: bunx electron-builder --mac dmg --${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: snip-desktop-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.dmg.blockmap
          if-no-files-found: error

  # Signed, versioned release with the auto-update feed. Triggered by pushing a
  # `desktop-v<version>` tag (the version must match desktop/package.json).
  #
  # Both arches build in ONE electron-builder invocation so it emits a single
  # `latest-mac.yml` that lists both — electron-updater on the client picks the
  # matching arch from it. The job then copies the per-arch DMGs to the stable
  # names the web "Download" buttons expect (snip-desktop.dmg / -x64) and marks
  # the release "latest", so `releases/latest/download/...` serves downloads AND
  # `releases/latest` is the feed electron-updater reads.
  release:
    name: Release (signed + auto-update feed)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('desktop/package.json') }}

      - name: Install desktop deps
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: desktop
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#desktop-v}"
          if [[ "$pkg_version" != "$tag_version" ]]; then
            echo "Tag ($tag_version) does not match package.json version ($pkg_version)." >&2
            echo "Bump desktop/package.json and re-tag as desktop-v$pkg_version." >&2
            exit 1
          fi

      - name: Install icon-generation tools
        run: brew install librsvg

      - name: Generate DMG assets (icon.icns + background)
        working-directory: desktop
        run: bun run generate:dmg-assets

      - name: Configure code signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            delim="EOF_$(openssl rand -hex 8)"
            {
              printf '%s<<%s\n%s\n%s\n' CSC_LINK "$delim" "$MACOS_CERTIFICATE" "$delim"
              printf '%s<<%s\n%s\n%s\n' CSC_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_ID "$delim" "$APPLE_ID_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_APP_SPECIFIC_PASSWORD "$delim" "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_TEAM_ID "$delim" "$APPLE_TEAM_ID_SECRET" "$delim"
            } >> "$GITHUB_ENV"
          else
            echo "::error::Auto-update needs a signed build, but no MACOS_CERTIFICATE secret is set."
            exit 1
          fi

      - name: Build + publish (signed, both arches, with latest-mac.yml)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release

      - name: Add stable-named DMGs + mark release latest
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          arm="release/snip-${version}-arm64.dmg"
          x64="release/snip-${version}-x64.dmg"
          if [[ ! -f "$arm" || ! -f "$x64" ]]; then
            echo "Expected DMGs not found:" >&2
            ls -la release/ >&2
            exit 1
          fi
          cp "$arm" release/snip-desktop.dmg
          cp "$x64" release/snip-desktop-x64.dmg
          gh release upload "$tag" \
            release/snip-desktop.dmg release/snip-desktop-x64.dmg \
            --clobber --repo "$GITHUB_REPOSITORY"
          # electron-builder publishes the release as a draft; promote it and
          # mark it latest so downloads + the updater feed both resolve here.
          gh release edit "$tag" --draft=false --latest --repo "$GITHUB_REPOSITORY"
