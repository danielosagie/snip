name: Build snip Desktop DMG

# Two paths:
#   • branch / PR pushes → unsigned per-arch smoke build (artifacts only), so
#     we know the desktop tree still compiles + packages.
#   • a `desktop-v<version>` tag → the signed `release` job: builds both arches
#     in one shot, publishes the DMG + zip + latest-mac.yml auto-update feed to
#     a GitHub Release, and marks it latest for downloads + the updater.

on:
  push:
    branches: [main]
    tags:
      - "desktop-v*"
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-dmg.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-dmg.yml"
  workflow_dispatch:

# Least privilege by default — the smoke-build job only needs read. The
# `release` job re-grants `contents: write` at job level to publish releases.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    # Smoke-build only on branches/PRs. Tag pushes go straight to the signed
    # `release` job below (a single both-arch invocation needed for a coherent
    # latest-mac.yml), so skip the per-arch matrix on tags.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('desktop/package.json') }}

      - name: Install desktop deps
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Install icon-generation tools
        run: brew install librsvg

      - name: Generate DMG assets (icon.icns + background)
        working-directory: desktop
        run: bun run generate:dmg-assets

      - name: Build renderer
        working-directory: desktop
        run: bun run build:renderer

      - name: Configure code signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            # Use the multiline-safe heredoc form so a base64 cert with
            # embedded newlines (the default `base64` line-wraps at col 76)
            # makes it through the env file intact.
            delim="EOF_$(openssl rand -hex 8)"
            {
              printf '%s<<%s\n%s\n%s\n' CSC_LINK "$delim" "$MACOS_CERTIFICATE" "$delim"
              printf '%s<<%s\n%s\n%s\n' CSC_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_ID "$delim" "$APPLE_ID_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_APP_SPECIFIC_PASSWORD "$delim" "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" "$delim"
              printf '%s<<%s\n%s\n%s\n' APPLE_TEAM_ID "$delim" "$APPLE_TEAM_ID_SECRET" "$delim"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "No MACOS_CERTIFICATE secret set — building unsigned DMG."
          fi

      - name: Build DMG (${{ matrix.arch }})
        working-directory: desktop
        # --publish never: this is a smoke build with no GH_TOKEN. Without the
        # flag, electron-builder auto-publishes in CI (the package.json publish
        # config is set) and fails on the missing token. Releases go through the
        # `release` job below.
        run: bunx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: snip-desktop-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.dmg.blockmap
          if-no-files-found: error

  # Signed, versioned release with the auto-update feed. Triggered by pushing a
  # `desktop-v<version>` tag (the version must match desktop/package.json).
  #
  # Both arches build in ONE electron-builder invocation so it emits a single
  # `latest-mac.yml` that lists both — electron-updater on the client picks the
  # matching arch from it. The job then copies the per-arch DMGs to the stable
  # names the web "Download" buttons expect (snip-desktop.dmg / -x64) and marks
  # the release "latest", so `releases/latest/download/...` serves downloads AND
  # `releases/latest` is the feed electron-updater reads.
  release:
    name: Release (signed + auto-update feed)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('desktop/package.json') }}

      - name: Install desktop deps
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: desktop
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#desktop-v}"
          if [[ "$pkg_version" != "$tag_version" ]]; then
            echo "Tag ($tag_version) does not match package.json version ($pkg_version)." >&2
            echo "Bump desktop/package.json and re-tag as desktop-v$pkg_version." >&2
            exit 1
          fi

      - name: Install icon-generation tools
        run: brew install librsvg

      - name: Generate DMG assets (icon.icns + background)
        working-directory: desktop
        run: bun run generate:dmg-assets

      - name: Configure code signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Auto-update needs a fully signed + notarized build, so require ALL
          # signing secrets up front rather than failing deep in the build with
          # an opaque error. The .pkg installer additionally needs the
          # Developer ID *Installer* cert (distinct from the Application cert).
          missing=""
          [[ -z "$MACOS_CERTIFICATE" ]] && missing+=" MACOS_CERTIFICATE"
          [[ -z "$MACOS_CERTIFICATE_PASSWORD" ]] && missing+=" MACOS_CERTIFICATE_PASSWORD"
          [[ -z "$MACOS_INSTALLER_CERTIFICATE" ]] && missing+=" MACOS_INSTALLER_CERTIFICATE"
          [[ -z "$APPLE_ID_SECRET" ]] && missing+=" APPLE_ID"
          [[ -z "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" ]] && missing+=" APPLE_APP_SPECIFIC_PASSWORD"
          [[ -z "$APPLE_TEAM_ID_SECRET" ]] && missing+=" APPLE_TEAM_ID"
          if [[ -n "$missing" ]]; then
            echo "::error::Signed build needs these secrets, which are missing:$missing"
            exit 1
          fi
          delim="EOF_$(openssl rand -hex 8)"
          {
            printf '%s<<%s\n%s\n%s\n' CSC_LINK "$delim" "$MACOS_CERTIFICATE" "$delim"
            printf '%s<<%s\n%s\n%s\n' CSC_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
            # The installer (.pkg) cert. It was exported with the same password
            # as the application cert, so reuse CSC_KEY_PASSWORD's value.
            printf '%s<<%s\n%s\n%s\n' CSC_INSTALLER_LINK "$delim" "$MACOS_INSTALLER_CERTIFICATE" "$delim"
            printf '%s<<%s\n%s\n%s\n' CSC_INSTALLER_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_ID "$delim" "$APPLE_ID_SECRET" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_APP_SPECIFIC_PASSWORD "$delim" "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_TEAM_ID "$delim" "$APPLE_TEAM_ID_SECRET" "$delim"
          } >> "$GITHUB_ENV"

      - name: Bundle macFUSE (downloaded into the .pkg)
        working-directory: desktop
        run: bash scripts/fetch-macfuse.sh

      - name: Build + publish (signed app + dmg + zip + pkg + latest-mac.yml)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release

      - name: Add stable-named installers + mark release latest
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          arm="release/snip-${version}-arm64.dmg"
          x64="release/snip-${version}-x64.dmg"
          arm_pkg="release/snip-${version}-arm64.pkg"
          x64_pkg="release/snip-${version}-x64.pkg"
          if [[ ! -f "$arm" || ! -f "$x64" ]]; then
            echo "Expected DMGs not found:" >&2
            ls -la release/ >&2
            exit 1
          fi
          cp "$arm" release/snip-desktop.dmg
          cp "$x64" release/snip-desktop-x64.dmg
          stable=(release/snip-desktop.dmg release/snip-desktop-x64.dmg)
          # The .pkg is the recommended installer (bundles macFUSE, Shade-style
          # wizard). Publish stable-named copies too.
          if [[ -f "$arm_pkg" && -f "$x64_pkg" ]]; then
            cp "$arm_pkg" release/snip-desktop.pkg
            cp "$x64_pkg" release/snip-desktop-x64.pkg
            stable+=(release/snip-desktop.pkg release/snip-desktop-x64.pkg)
          else
            echo "::warning::Expected .pkg installers not found — publishing DMGs only."
            ls -la release/ || true
          fi
          gh release upload "$tag" "${stable[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          # electron-builder publishes the release as a draft; promote it and
          # mark it latest so downloads + the updater feed both resolve here.
          gh release edit "$tag" --draft=false --latest --repo "$GITHUB_REPOSITORY"
